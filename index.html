<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            font-family: 'Sneak', -apple-system, sans-serif;
            color: #1e1e1e;
            line-height: 1.6;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .item {
            margin-bottom: 60px;
        }

        .img-box {
            width: 100%;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 2px;
            overflow: hidden;
            background-color: #fcfcfc;
            margin-bottom: 12px;
        }

        img {
            width: 100%;
            display: block;
            height: auto;
        }

        .caption {
            font-size: 14px;
            color: rgba(0,0,0,0.45); /* Subtelny szary */
            text-transform: none; /* Wielkość liter */
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="container">

        <div class="item">
            <div class="img-box">
                <img "analiza.png" alt="Audit excerpt">
            </div>
            <p class="caption">Audit excerpt</p>
        </div>

        <div class="item">
            <div class="img-box">
                <img src="strategia.png" alt="Audit excerpt">
            </div>
            <p class="caption">Audit excerpt</p>
        </div>

        <div class="item">
            <div class="img-box">
                <img src="iteracje.png" alt="Justpoint.com iterations">
            </div>
            <p class="caption">Justpoint.com iterations</p>
        </div>

        <div class="item">
            <div class="img-box">
                <img src="warsztaty.png" alt="Workshop Miro board">
            </div>
            <p class="caption">Workshop Miro board</p>
        </div>

    </div>

</body>
</html>
